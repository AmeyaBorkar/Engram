[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "engram"
version = "0.1.0.dev0"
description = "Hierarchical memory with consolidation and principled decay for LLM agents and assistants."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Ameya Borkar", email = "ameyaborkar17@gmail.com" }]
keywords = ["llm", "memory", "agents", "rag", "consolidation", "retrieval"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.40"]
anthropic = ["anthropic>=0.40"]
postgres = ["psycopg[binary]>=3.1"]
duckdb = ["duckdb>=0.10"]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "hypothesis>=6.100",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/AmeyaBorkar/Engram"
Repository = "https://github.com/AmeyaBorkar/Engram"
Issues = "https://github.com/AmeyaBorkar/Engram/issues"
Changelog = "https://github.com/AmeyaBorkar/Engram/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/engram"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/LICENSE",
    "/CONTRIBUTING.md",
    "/SECURITY.md",
    "/CHANGELOG.md",
    "/ROADMAP.md",
    "/pyproject.toml",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
    "S",    # bandit / security
    "C4",   # comprehensions
    "PIE",  # misc useful rules
    "RET",  # return-statement consistency
    "RUF",  # ruff-specific
    "N",    # pep8-naming
    "ARG",  # unused arguments
    "PT",   # pytest style
    "TID",  # tidy imports
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "B", "SIM", "ARG"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src/engram"]
pretty = true
show_error_codes = true
warn_unreachable = true

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra --strict-markers --strict-config"

[tool.coverage.run]
source = ["engram"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@abstractmethod",
]
