name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy

  test:
    name: test (py${{ matrix.python }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev,bench]"
      - name: Pytest
        run: pytest --cov=engram --cov-report=term-missing --cov-report=xml
      - name: Smoke benchmark (noop suite, fake provider)
        run: python -m engram.bench run noop --provider fake --runs-dir benchmarks/runs/ci
      - name: Recall-smoke benchmark (engram vs chroma vs hybrid)
        run: python -m engram.bench run recall-smoke --provider fake --runs-dir benchmarks/runs/ci
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
      - name: Upload smoke-benchmark manifest
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-benchmark-manifest
          path: benchmarks/runs/ci/*.json
          if-no-files-found: error

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install project + extras + pip-audit
        run: |
          # Upgrade pip first so CVEs against the runner's bundled pip
          # itself (which we don't actually depend on at runtime) are fixed
          # where upstream provides a patch.
          python -m pip install --upgrade pip
          pip install -e ".[dev,openai,anthropic,postgres,duckdb,consolidation]"
          pip install pip-audit
      - name: Audit
        # `--skip-editable` skips the local editable install of engram itself
        # (not yet published to PyPI). All real dependencies are still audited;
        # pip-audit still exits non-zero if any of them has a known CVE.
        # `--strict` is intentionally absent: with it, the skipped editable
        # itself becomes a CI-blocking error.
        #
        # `--ignore-vuln CVE-2026-3219` — pip CLI CVE with no fix available
        # at the time of writing. pip is not a runtime dependency of engram;
        # remove this ignore once upstream ships a patch.
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219
